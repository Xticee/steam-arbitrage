<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SteamProfit — Пополняй в плюс</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0a0a'/><text x='50' y='50' font-family='Arial Black,sans-serif' font-size='80' font-weight='900' text-anchor='middle' dominant-baseline='central' fill='%2300ff87'>P</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --accent: #00ff87;
    --accent-dim: rgba(0, 255, 135, 0.08);
    --text: #e8e8e8;
    --muted: #555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,135,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,135,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  header {
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .hero {
    padding: 64px 0 48px;
    text-align: center;
  }

  .hero-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 8vw, 88px);
    line-height: 0.95;
    letter-spacing: 1px;
    color: var(--text);
    margin-bottom: 16px;
  }

  .hero h1 em { font-style: normal; color: var(--accent); }

  .hero p {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    max-width: 400px;
    margin: 0 auto 48px;
    line-height: 1.6;
  }

  .search-box {
    display: flex;
    max-width: 480px;
    margin: 0 auto;
    border: 1px solid var(--border);
    background: var(--surface);
    position: relative;
  }

  .search-box::before {
    content: '₽';
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent);
    font-size: 18px;
    pointer-events: none;
  }

  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 18px 20px 18px 48px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    color: var(--text);
    width: 100%;
  }

  .search-box input::placeholder { color: var(--muted); }
  .search-box input::-webkit-outer-spin-button,
  .search-box input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .search-box input[type=number] { -moz-appearance: textfield; }

  .search-box button {
    background: var(--accent);
    border: none;
    padding: 0 28px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: #000;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .search-box button:hover { opacity: 0.85; }

  .results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .results-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .results-header span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 80px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    display: grid;
    grid-template-columns: 72px 1fr auto;
    align-items: center;
    gap: 20px;
    padding: 16px 20px;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
    animation: fadeIn 0.4s ease both;
    position: relative;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }
  .card:nth-child(5) { animation-delay: 0.25s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    border-color: rgba(0,255,135,0.3);
    background: var(--accent-dim);
  }

  .card-rank {
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    color: var(--muted);
    top: -1px;
    left: -1px;
    padding: 2px 6px;
    background: var(--border);
  }

  .card-img {
    width: 72px;
    height: 52px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-img img { width: 100%; height: 100%; object-fit: contain; }

  .card-img-placeholder {
    width: 72px;
    height: 52px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    flex-shrink: 0;
  }

  .card-info { min-width: 0; }

  .card-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 6px;
  }

  .card-prices {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
  }

  .price-market a {
    color: orange;
    text-decoration: underline;
    text-decoration-color: rgba(255,165,0,0.4);
    text-underline-offset: 2px;
  }

  .price-market a:hover {
    text-decoration-color: orange;
  }

  .price-arrow { color: var(--border); font-size: 10px; }

  .price-steam a {
    color: #1b9cfc;
    text-decoration: underline;
    text-decoration-color: rgba(27,156,252,0.4);
    text-underline-offset: 2px;
  }

  .price-steam a:hover {
    text-decoration-color: #1b9cfc;
  }

  .card-profit {
    text-align: right;
    flex-shrink: 0;
  }

  .profit-rub {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 2px;
  }

  .profit-pct {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: rgba(0,255,135,0.5);
  }

  .profit-balance {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .empty {
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }

  .empty p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  footer p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  footer a { text-decoration: none; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">Steam<span>Profit</span></div>
  </header>

  <section class="hero">
    <div class="hero-tag">// пополнение стима в плюс</div>
    <h1>Купи дешевле.<br><em>Продай в Steam.</em></h1>
    <p>Введи сумму которую хочешь получить на Steam кошелёк — мы найдём самые выгодные предметы для перепродажи.</p>
    <div class="search-box">
      <input type="number" placeholder="1000" id="amountInput" min="1" />
      <button onclick="search()">НАЙТИ</button>
    </div>
  </section>

  <div id="results" style="display:none">
    <div class="results-header">
      <h2>Лучшие варианты</h2>
      <span id="resultsCount"></span>
    </div>
    <div class="cards" id="cardsList"></div>
  </div>

  <div id="emptyState" style="display:none" class="empty">
    <div class="empty-icon">◈</div>
    <p>Предметы не найдены для указанной суммы</p>
  </div>

  <footer>
    <p>Данные: <a href="https://lis-skins.com" style="color: orange;">lis-skins.com</a> + <span style="color: #1b9cfc;">Steam</span></p>
    <p>Комиссия Steam 13% уже учтена</p>
  </footer>
</div>

<script>
  async function search() {
    const amount = parseFloat(document.getElementById('amountInput').value);
    if (!amount) return;

    document.querySelector('.hero p').style.display = 'none';

    const results = document.getElementById('results');
    const empty = document.getElementById('emptyState');
    const cardsList = document.getElementById('cardsList');
    const count = document.getElementById('resultsCount');

    let items;
    try {
      const resp = await fetch(`/search?amount=${amount}`);
      items = await resp.json();
    } catch (e) {
      empty.style.display = 'block';
      results.style.display = 'none';
      return;
    }

    if (!items || items.length === 0) {
      results.style.display = 'none';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    results.style.display = 'block';
    count.textContent = `найдено ${items.length}`;

    cardsList.innerHTML = items.map((item, idx) => {
      const pct = item.steam_price > 0 ? (item.profit / (item.market_price * 1.05821) * 100).toFixed(1) : '0.0';
      const imgUrl = item.icon_id
        ? `https://community.cloudflare.steamstatic.com/economy/image/${item.icon_id}/72fx52f`
        : null;
      const lisSlug = item.name.toLowerCase().replace(/ /g, '-');
      const lisUrl = `https://lis-skins.com/ru/market/rust/${lisSlug}/`;
      const steamUrl = `https://steamcommunity.com/market/listings/252490/${encodeURIComponent(item.name)}`;
      return `
        <div class="card">
          <span class="card-rank">${String(idx+1).padStart(2,'0')}</span>
          ${imgUrl
            ? `<div class="card-img"><img src="${imgUrl}" alt="${item.name}"></div>`
            : `<div class="card-img-placeholder">IMG</div>`}
          <div class="card-info">
            <div class="card-name">${item.name}</div>
            <div class="card-prices">
              <span class="price-market"><a href="${lisUrl}" target="_blank">${item.market_price.toFixed(0)} ₽ lis-skins</a></span>
              <span class="price-arrow">→</span>
              <span class="price-steam"><a href="${steamUrl}" target="_blank">${item.steam_price.toFixed(0)} ₽ в Steam</a></span>
            </div>
          </div>
          <div class="card-profit">
            <div class="profit-rub">+${item.profit.toFixed(0)} ₽</div>
            <div class="profit-pct">+${pct}%</div>
            <div class="profit-balance">${item.steam_balance.toFixed(0)} ₽ на баланс</div>
          </div>
        </div>
      `;
    }).join('');
  }

  document.getElementById('amountInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });
</script>

</body>
</html>
